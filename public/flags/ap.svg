<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 60">
  <!-- Asamblea Popular / Unidad Popular: rojo (arriba) / verde (abajo) + "UP" negro -->
  <rect x="0" y="0"  width="90" height="30" fill="#E2231A"/>
  <rect x="0" y="30" width="90" height="30" fill="#0F9D3A"/>
  <text x="45" y="30" fill="#111111"
        font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800"
        text-anchor="middle" dominant-baseline="central">UP</text>
</svg>
